name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      dry_run_tag:
        description: Tag-like version to validate without creating a release.
        required: true
        default: v0.1.0

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: gd
  SKILL_NAME: relay-gitcode-cli
  CLAWHUB_CLI_VERSION: 0.17.0

jobs:
  verify:
    name: Verify release inputs and quality gates
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      publish_crate: ${{ steps.version.outputs.publish_crate }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.dry_run_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0, 0.1.0, or v0.1.0-rc.1: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          manifest_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"

          if [[ "$version" != "$manifest_version" ]]; then
            echo "Tag $tag does not match Cargo.toml package.version $manifest_version" >&2
            exit 1
          fi

          prerelease=false
          publish_crate=true
          if [[ "$version" == *-* || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            prerelease=true
            publish_crate=false
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "prerelease=$prerelease"
            echo "publish_crate=$publish_crate"
          } >> "$GITHUB_OUTPUT"

      - name: Format gate
        run: cargo fmt --all -- --check

      - name: Clippy gate
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test suite
        run: cargo test --all-targets --all-features

      - name: Package crate
        run: cargo package

      - name: Validate CLI skill bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f "skills/${SKILL_NAME}/SKILL.md"
          test -f "skills/${SKILL_NAME}/agents/openai.yaml"
          test -f "skills/${SKILL_NAME}/references/cli-workflows.md"
          grep -q '^name: relay-gitcode-cli$' "skills/${SKILL_NAME}/SKILL.md"
          grep -q '^  version: 0\.0\.0$' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'homepage: https://github.com/coolplayagent/relay-gitcode-cli' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'GITCODE_TOKEN' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'gd version check --json' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'gd api /user --json' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'assets/bin/linux-x86_64/gd' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'assets/bin/windows-x86_64/gd.exe' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'HTTPS_PROXY' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'Do not use this skill for GitHub-only' "skills/${SKILL_NAME}/SKILL.md"
          grep -q 'default_prompt: "Use \$relay-gitcode-cli' "skills/${SKILL_NAME}/agents/openai.yaml"

      - name: Publish dry run
        run: cargo publish --dry-run

      - name: Verify repository is unchanged after checks
        run: git diff --exit-code

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
            cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
            msvc_arch: amd64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
            msvc_arch: amd64_arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}

      - name: Set up Linux cross toolchain
        if: matrix.cross == true
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Set up MSVC toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Smoke test release binary
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          target/${{ matrix.target }}/release/${BIN_NAME} --version
          target/${{ matrix.target }}/release/${BIN_NAME} auth status --json

      - name: Smoke test Windows x64 release binary
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          target\${{ matrix.target }}\release\${{ env.BIN_NAME }}.exe --version
          target\${{ matrix.target }}\release\${{ env.BIN_NAME }}.exe auth status --json

      - name: Prepare archive directory
        shell: bash
        run: |
          set -euo pipefail
          package="${BIN_NAME}-${{ needs.verify.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "dist/$package"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "dist/$package/"
          else
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/$package/"
          fi
          cp README.md LICENSE "dist/$package/"

      - name: Create tar archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          package="${BIN_NAME}-${{ needs.verify.outputs.tag }}-${{ matrix.target }}"
          tar -C dist -czf "dist/$package.tar.gz" "$package"

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $package = "${{ env.BIN_NAME }}-${{ needs.verify.outputs.tag }}-${{ matrix.target }}"
          Compress-Archive -Path "dist\$package" -DestinationPath "dist\$package.zip" -Force

      - name: Upload release archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BIN_NAME }}-${{ needs.verify.outputs.tag }}-${{ matrix.target }}
          path: dist/${{ env.BIN_NAME }}-${{ needs.verify.outputs.tag }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  skill:
    name: Package CLI skill
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Download Linux x64 release archive
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.BIN_NAME }}-${{ needs.verify.outputs.tag }}-x86_64-unknown-linux-gnu
          path: skill-assets/linux-x86_64

      - name: Download Windows x64 release archive
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.BIN_NAME }}-${{ needs.verify.outputs.tag }}-x86_64-pc-windows-msvc
          path: skill-assets/windows-x86_64

      - name: Validate CLI skill version inputs
        shell: bash
        run: |
          set -euo pipefail
          manifest_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [[ "$manifest_version" != "${{ needs.verify.outputs.version }}" ]]; then
            echo "Skill release version must follow Cargo.toml: $manifest_version != ${{ needs.verify.outputs.version }}" >&2
            exit 1
          fi

      - name: Inject CLI skill metadata version
        env:
          SKILL_VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          skill_file="skills/${SKILL_NAME}/SKILL.md"
          python3 - "$skill_file" "$SKILL_VERSION" <<'PY'
          import pathlib
          import sys

          skill_file, version = sys.argv[1:]
          path = pathlib.Path(skill_file)
          text = path.read_text()
          placeholder = "\nmetadata:\n  version: 0.0.0\n"
          replacement = f"\nmetadata:\n  version: {version}\n"
          if placeholder not in text:
              raise SystemExit(f"{skill_file} does not contain the metadata.version placeholder")
          path.write_text(text.replace(placeholder, replacement, 1))
          PY
          grep -q "^  version: ${SKILL_VERSION}$" "$skill_file"

      - name: Inject bundled gd binaries
        shell: bash
        run: |
          set -euo pipefail
          linux_target="x86_64-unknown-linux-gnu"
          windows_target="x86_64-pc-windows-msvc"
          linux_archive="skill-assets/linux-x86_64/${BIN_NAME}-${{ needs.verify.outputs.tag }}-${linux_target}.tar.gz"
          windows_archive="skill-assets/windows-x86_64/${BIN_NAME}-${{ needs.verify.outputs.tag }}-${windows_target}.zip"

          linux_asset="skills/${SKILL_NAME}/assets/bin/linux-x86_64/${BIN_NAME}"
          windows_asset="skills/${SKILL_NAME}/assets/bin/windows-x86_64/${BIN_NAME}.exe"
          mkdir -p "$(dirname "$linux_asset")" "$(dirname "$windows_asset")"

          tar -xOf "$linux_archive" "${BIN_NAME}-${{ needs.verify.outputs.tag }}-${linux_target}/${BIN_NAME}" > "$linux_asset"
          chmod 0755 "$linux_asset"

          python3 - "$windows_archive" "${BIN_NAME}-${{ needs.verify.outputs.tag }}-${windows_target}/${BIN_NAME}.exe" "$windows_asset" <<'PY'
          import pathlib
          import sys
          import zipfile

          archive, member, output = sys.argv[1:]
          pathlib.Path(output).write_bytes(zipfile.ZipFile(archive).read(member))
          PY

          test -x "$linux_asset"
          test -f "$windows_asset"
          "$linux_asset" --version

      - name: Create skill archive
        shell: bash
        run: |
          set -euo pipefail
          package="${SKILL_NAME}-skill-${{ needs.verify.outputs.tag }}"
          mkdir -p "dist/$package"
          cp -R "skills/${SKILL_NAME}/." "dist/$package/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"

      - name: Upload skill archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SKILL_NAME }}-skill-${{ needs.verify.outputs.tag }}
          path: dist/${{ env.SKILL_NAME }}-skill-${{ needs.verify.outputs.tag }}.tar.gz
          if-no-files-found: error

  publish-crate:
    name: Publish crate
    if: github.event_name == 'push' && needs.verify.outputs.publish_crate == 'true'
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.verify.outputs.version }}"
          published="$(python3 - "$version" <<'PY'
          import json
          import sys
          import urllib.error
          import urllib.request

          version = sys.argv[1]
          try:
              with urllib.request.urlopen("https://crates.io/api/v1/crates/relay-gitcode-cli", timeout=30) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  print(False)
                  raise SystemExit(0)
              raise

          print(any(item["num"] == version for item in payload["versions"]))
          PY
          )"

          if [[ "$published" == "True" ]]; then
            echo "relay-gitcode-cli $version is already published on crates.io; skipping."
            exit 0
          fi

          cargo publish

  release:
    name: Publish GitHub Release
    if: always() && github.event_name == 'push' && needs.verify.result == 'success' && needs.build.result == 'success' && needs.skill.result == 'success' && (needs.publish-crate.result == 'success' || needs.publish-crate.result == 'skipped')
    needs:
      - verify
      - build
      - skill
      - publish-crate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download archives
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<'NOTES'
          ## Install

          Download the archive for your platform from this release, verify it with `checksums.txt`, and place the `gd` binary on your PATH.

          Rust users can install from crates.io after the crate is published:

          ```bash
          cargo install relay-gitcode-cli --force
          gd --version
          gd version check
          ```

          ## CLI Skill

          This release includes `relay-gitcode-cli-skill-${{ needs.verify.outputs.tag }}.tar.gz`, a ClawHub-compatible skill that teaches LLM agents to use `gd` for GitCode API v5 workflows. The skill includes bundled Linux x64 and Windows x64 `gd` binaries and falls back to PATH, crates.io, or GitHub Releases when needed.

          Registry maintainers can publish the same skill directory with:

          ```bash
          tar -xzf relay-gitcode-cli-skill-${{ needs.verify.outputs.tag }}.tar.gz
          clawhub skill publish relay-gitcode-cli-skill-${{ needs.verify.outputs.tag }} --slug relay-gitcode-cli --name "Relay GitCode CLI" --version ${{ needs.verify.outputs.version }}
          ```

          ## Verification

          ```bash
          sha256sum -c checksums.txt
          gd --version
          gd version check --json
          gd auth status --json
          ```

          ## Platform Artifacts

          - Linux x64: `x86_64-unknown-linux-gnu`
          - Linux ARM64: `aarch64-unknown-linux-gnu`
          - macOS Intel: `x86_64-apple-darwin`
          - macOS Apple Silicon: `aarch64-apple-darwin`
          - Windows x64: `x86_64-pc-windows-msvc`
          - Windows ARM64: `aarch64-pc-windows-msvc`
          NOTES

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.verify.outputs.tag }}"
          prerelease_args=()
          if [[ "${{ needs.verify.outputs.prerelease }}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "${{ github.repository }}" \
              --title "gd $tag" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
            gh release upload "$tag" --repo "${{ github.repository }}" --clobber dist/*
            exit 0
          fi

          gh release create "$tag" dist/* \
            --repo "${{ github.repository }}" \
            --title "gd $tag" \
            --notes-file release-notes.md \
            "${prerelease_args[@]}"

  sync-gitcode-release:
    name: Sync GitCode Release
    if: always() && github.event_name == 'push' && needs.release.result == 'success'
    needs:
      - verify
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check GitCode token
        id: gitcode-token
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GITCODE_TOKEN:-}" ]]; then
            echo "sync=false" >> "$GITHUB_OUTPUT"
            echo "GITCODE_TOKEN is not configured; skipping GitCode Release sync."
            exit 0
          fi
          echo "sync=true" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        if: steps.gitcode-token.outputs.sync == 'true'
        run: rustup toolchain install stable --profile minimal

      - name: Migrate GitHub Release to GitCode
        if: steps.gitcode-token.outputs.sync == 'true'
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -- repo sync-github "${{ github.repository }}" \
            --repo plm-cac/relay-gitcode-cli \
            --private \
            --if-exists skip \
            --json

          cargo run --locked -- release migrate-github \
            --repo plm-cac/relay-gitcode-cli \
            --github-repo "${{ github.repository }}" \
            --tag "${{ needs.verify.outputs.tag }}" \
            --skip-existing-assets \
            --update-release \
            --json

  publish-skill:
    name: Publish ClawHub skill
    if: github.event_name == 'push'
    needs:
      - verify
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check ClawHub token
        id: clawhub-token
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLAWHUB_TOKEN:-}" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "CLAWHUB_TOKEN is not configured; skipping ClawHub publish."
            exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Download packaged skill archive
        if: steps.clawhub-token.outputs.publish == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.SKILL_NAME }}-skill-${{ needs.verify.outputs.tag }}
          path: packaged-skill

      - name: Extract packaged skill archive
        if: steps.clawhub-token.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          package="${SKILL_NAME}-skill-${{ needs.verify.outputs.tag }}"
          archive="packaged-skill/${package}.tar.gz"
          mkdir -p clawhub-skill
          tar -C clawhub-skill -xzf "$archive"
          test -x "clawhub-skill/${package}/assets/bin/linux-x86_64/${BIN_NAME}"
          test -f "clawhub-skill/${package}/assets/bin/windows-x86_64/${BIN_NAME}.exe"

      - name: Set up Node
        if: steps.clawhub-token.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install ClawHub CLI
        if: steps.clawhub-token.outputs.publish == 'true'
        run: npm install -g "clawhub@${CLAWHUB_CLI_VERSION}"

      - name: Verify ClawHub CLI
        if: steps.clawhub-token.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          clawhub --cli-version
          clawhub skill publish --help >/dev/null

      - name: Publish skill
        if: steps.clawhub-token.outputs.publish == 'true'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tags="latest"
          if [[ "${{ needs.verify.outputs.prerelease }}" == "true" ]]; then
            tags="prerelease"
          fi

          clawhub --no-input login --token "$CLAWHUB_TOKEN"
          clawhub --no-input skill publish "clawhub-skill/${SKILL_NAME}-skill-${{ needs.verify.outputs.tag }}" \
            --slug "${SKILL_NAME}" \
            --name "Relay GitCode CLI" \
            --version "${{ needs.verify.outputs.version }}" \
            --changelog "gd ${{ needs.verify.outputs.tag }}" \
            --tags "$tags"
